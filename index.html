<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MenuAR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; overflow: hidden; width: 100vw; height: 100vh; background: #0a0a0a; display: flex; align-items: center; justify-content: center; }
    #scene { position: relative; width: 100%; max-width: 420px; height: 100vh; overflow: hidden; }

    /* ===== FADE ===== */
    #fade-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; opacity: 0; z-index: 500; pointer-events: none; transition: opacity 0.6s ease; }
    #fade-overlay.fade { opacity: 1; }

    /* ===== WAX SEAL SCREEN ===== */
    #wax-screen {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #0D0D0D 0%, #1A1008 40%, #0D0805 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 10; gap: 0;
    }

    /* ENVELOPE */
    .envelope-wrap {
      position: relative;
      width: 280px; height: 200px;
      margin-bottom: 8px;
    }
    .envelope {
      width: 100%; height: 100%;
      background: linear-gradient(160deg, #1C1208, #2A1A08, #1C1208);
      border-radius: 4px;
      border: 1px solid rgba(201,168,76,0.3);
      position: relative;
      box-shadow: 0 8px 32px rgba(0,0,0,0.8), 0 0 60px rgba(201,168,76,0.05);
      overflow: hidden;
    }
    /* Envelope flap top */
    .envelope::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 0; height: 0;
      border-left: 140px solid transparent;
      border-right: 140px solid transparent;
      border-top: 90px solid #150F05;
      z-index: 2;
    }
    /* Envelope bottom triangle */
    .envelope::after {
      content: '';
      position: absolute; bottom: 0; left: 0;
      width: 0; height: 0;
      border-left: 140px solid transparent;
      border-right: 140px solid transparent;
      border-bottom: 80px solid #120C04;
      z-index: 1;
    }
    /* Left triangle */
    .env-left {
      position: absolute; top: 0; left: 0;
      width: 0; height: 0;
      border-top: 100px solid transparent;
      border-bottom: 100px solid transparent;
      border-left: 100px solid #181005;
      z-index: 1;
    }
    /* Right triangle */
    .env-right {
      position: absolute; top: 0; right: 0;
      width: 0; height: 0;
      border-top: 100px solid transparent;
      border-bottom: 100px solid transparent;
      border-right: 100px solid #181005;
      z-index: 1;
    }
    /* Gold border lines */
    .env-line-h {
      position: absolute; top: 50%; left: 5%;
      width: 90%; height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,168,76,0.2), transparent);
    }

    /* CAFE NAME ON ENVELOPE */
    .env-cafe-name {
      position: absolute; bottom: 22%; left: 50%;
      transform: translateX(-50%);
      font-family: 'Georgia', serif;
      font-size: 13px; color: rgba(201,168,76,0.5);
      letter-spacing: 4px; white-space: nowrap;
      z-index: 5;
    }

    /* WAX SEAL */
    .wax-seal {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 70px; height: 70px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #C0392B, #8B0000, #5D0000);
      box-shadow: 0 0 0 3px rgba(180,50,30,0.4), 0 0 20px rgba(180,30,10,0.6), 0 4px 12px rgba(0,0,0,0.8);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 10;
      animation: seal-pulse 2s ease-in-out infinite;
      transition: transform 0.1s ease;
    }
    .wax-seal:active { transform: translate(-50%, -50%) scale(0.95); }
    .wax-seal-inner {
      width: 54px; height: 54px;
      border-radius: 50%;
      border: 1px solid rgba(255,200,180,0.2);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2px;
    }
    .seal-crown { font-size: 18px; line-height: 1; }
    .seal-text { font-size: 7px; color: rgba(255,220,200,0.7); letter-spacing: 2px; font-family: 'Georgia', serif; }

    @keyframes seal-pulse {
      0%,100% { box-shadow: 0 0 0 3px rgba(180,50,30,0.4), 0 0 20px rgba(180,30,10,0.6), 0 4px 12px rgba(0,0,0,0.8); }
      50% { box-shadow: 0 0 0 6px rgba(180,50,30,0.2), 0 0 40px rgba(200,40,10,0.8), 0 4px 12px rgba(0,0,0,0.8); }
    }

    /* CRACK OVERLAY */
    .seal-crack {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 70px; height: 70px;
      border-radius: 50%;
      pointer-events: none; z-index: 11;
      opacity: 0;
    }

    /* HINT TEXT */
    .seal-hint {
      font-family: 'Georgia', serif;
      font-size: 11px; color: rgba(201,168,76,0.6);
      letter-spacing: 2px; text-align: center;
      margin-top: 16px;
      animation: seal-pulse 2s ease-in-out infinite;
    }

    /* PARTICLE */
    .wax-particle {
      position: fixed; pointer-events: none;
      border-radius: 50%;
      animation: particle-explode 0.8s ease forwards;
      z-index: 999;
    }
    @keyframes particle-explode {
      0% { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0.2); }
    }

    /* RIPPLE */
    .seal-ripple {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 70px; height: 70px;
      border-radius: 50%;
      border: 3px solid rgba(180,30,10,0.8);
      animation: ripple-out 0.4s ease forwards;
      pointer-events: none; z-index: 12;
    }
    @keyframes ripple-out {
      0% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%,-50%) scale(2.5); }
    }

    /* ENVELOPE TEAR */
    #wax-screen.tearing {
      animation: screen-shake 0.3s ease;
    }
    @keyframes screen-shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    /* ===== INTERIOR SCREEN ===== */
    #interior-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 2; overflow: hidden; }
    #interior-screen.show { display: block; }
    .int-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://raw.githubusercontent.com/7flashybro-code/cafe/main/interior.png'); background-size: cover; background-position: center top; filter: brightness(1.05); }

    /* ===== BOOK ===== */
    #book-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 88%; z-index: 10; display: none; }
    #book-container.show { display: block; }
    .book { position: relative; width: 100%; height: 240px; perspective: 1000px; }
    .book-cover { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #6B3A1F, #4A2510, #8B5230); border-radius: 4px 12px 12px 4px; border: 2px solid #C9A84C; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; box-shadow: -4px 4px 20px rgba(0,0,0,0.6), 4px 4px 20px rgba(0,0,0,0.4); z-index: 5; transition: transform 0.8s ease; transform-style: preserve-3d; }
    .book-cover.open { transform: rotateY(-180deg); transform-origin: left center; }
    .book-spine { position: absolute; left: 0; top: 0; width: 14px; height: 100%; background: linear-gradient(180deg, #3D1A00, #6B3A1F, #3D1A00); border-radius: 4px 0 0 4px; border-right: 1px solid #C9A84C; }
    .book-title { font-family: 'Georgia', serif; color: #C9A84C; font-size: 18px; letter-spacing: 3px; }
    .book-subtitle { color: rgba(201,168,76,0.6); font-size: 10px; letter-spacing: 2px; }
    .book-ornament { color: #C9A84C; font-size: 20px; }
    .left-page { position: absolute; top: 0; left: 0; width: 50%; height: 100%; background: linear-gradient(135deg, #FFF0DC, #FFF8F0); border: 1px solid #DDD0B0; border-right: none; border-radius: 8px 0 0 8px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; padding: 12px; }
    .book-divider { position: absolute; top: 0; left: 50%; width: 3px; height: 100%; background: linear-gradient(180deg, #3D1A00, #6B3A1F, #3D1A00); z-index: 2; box-shadow: -2px 0 6px rgba(0,0,0,0.3), 2px 0 6px rgba(0,0,0,0.3); }
    .page { position: absolute; top: 0; width: 50%; height: 100%; transform-origin: left center; transform-style: preserve-3d; transition: transform 0.5s ease-in-out; left: 50%; }
    .page-front, .page-back { position: absolute; top: 0; left: 0; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px; border-radius: 0 8px 8px 0; padding: 10px; }
    .page-front { background: linear-gradient(135deg, #FFF8F0, #FFF0DC); border: 1px solid #DDD0B0; border-left: none; }
    .page-back { background: linear-gradient(135deg, #FFF0DC, #FFF8F0); border: 1px solid #DDD0B0; border-left: none; transform: rotateY(180deg); }
    .page.turned { transform: rotateY(-180deg); }
    .page-emoji { font-size: 26px; }
    .page-name { font-family: 'Georgia', serif; font-size: 11px; font-weight: bold; color: #4A2A10; letter-spacing: 1px; text-align: center; }
    .page-line { width: 30px; height: 1px; background: #C9A84C; opacity: 0.5; }

    /* ===== CATEGORY GRID ===== */
    #category-grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 10; overflow-y: auto; padding: 10px 8px 60px; background: transparent; }
    #category-grid.show { display: block; }
    .grid-title { font-family: 'Georgia', serif; color: #fff; font-size: 14px; letter-spacing: 3px; text-align: center; margin-bottom: 10px; text-shadow: 0 2px 8px rgba(0,0,0,0.9); font-weight: bold; }
    .cat-row { display: flex; gap: 8px; margin-bottom: 8px; justify-content: center; }
    .cat-card { flex: 1; max-width: 48%; background: rgba(255,248,235,0.72); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1.5px solid rgba(201,168,76,0.6); border-radius: 12px; padding: 12px 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 3px 12px rgba(0,0,0,0.2); }
    .cat-card:active { transform: scale(0.95); }
    .cat-emoji { font-size: 30px; }
    .cat-name { font-family: 'Georgia', serif; font-size: 12px; font-weight: bold; color: #3A1A00; letter-spacing: 1px; text-align: center; }

    /* ===== CHALKBOARD SCREEN ===== */
    #chalkboard-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; transform: translateX(-100%); transition: transform 0.4s cubic-bezier(0.4,0,0.2,1); display: flex; align-items: center; justify-content: center; background: #2C1A0A; }
    #chalkboard-screen.show { transform: translateX(0); }
    .chalk-frame { position: absolute; top: 3%; left: 3%; right: 3%; bottom: 3%; background: linear-gradient(135deg, #8B5E3C, #6B3A1F, #A0714F, #6B3A1F); border-radius: 8px; padding: 12px; box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 8px 24px rgba(0,0,0,0.6); }
    .chalk-frame::before { content: ''; position: absolute; top: 6px; left: 6px; right: 6px; bottom: 6px; border: 2px solid rgba(201,168,76,0.3); border-radius: 4px; pointer-events: none; }
    .chalk-surface { width: 100%; height: 100%; background: #1A3A2A; background-image: radial-gradient(ellipse at 20% 30%, rgba(255,255,255,0.02) 0%, transparent 50%), radial-gradient(ellipse at 80% 70%, rgba(255,255,255,0.02) 0%, transparent 50%); border-radius: 4px; overflow-y: auto; padding: 16px 14px 20px; position: relative; }
    .chalk-surface::before { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 6px; background: rgba(255,255,255,0.06); border-radius: 0 0 4px 4px; }
    .back-btn { display: flex; align-items: center; gap: 6px; background: none; border: none; color: rgba(255,255,255,0.7); font-size: 13px; cursor: pointer; margin-bottom: 12px; font-family: 'Georgia', serif; letter-spacing: 1px; padding: 4px 0; }
    .back-btn:active { opacity: 0.6; }
    .back-arrow { font-size: 16px; }
    .chalk-title { font-family: 'Georgia', serif; font-size: 22px; color: #fff; text-align: center; letter-spacing: 4px; margin-bottom: 6px; text-shadow: 1px 1px 0 rgba(255,255,255,0.1); opacity: 0; animation: chalk-appear 0.6s ease forwards; }
    .chalk-divider { width: 80%; height: 1px; background: rgba(255,255,255,0.25); margin: 0 auto 16px; opacity: 0; animation: chalk-appear 0.6s ease 0.2s forwards; }
    .chalk-item { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px dashed rgba(255,255,255,0.15); opacity: 0; }
    .chalk-item:last-child { border-bottom: none; margin-bottom: 0; }
    .chalk-item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .chalk-item-name { font-family: 'Georgia', serif; font-size: 16px; color: #fff; font-weight: bold; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
    .chalk-item-emoji { font-size: 20px; }
    .chalk-price-tag { background: #E8A020; color: #fff; font-size: 13px; font-weight: bold; padding: 3px 10px; border-radius: 99px; letter-spacing: 0.5px; font-family: sans-serif; }
    .chalk-item-desc { font-size: 12px; color: rgba(255,255,255,0.6); font-style: italic; margin-bottom: 8px; line-height: 1.4; font-family: 'Georgia', serif; letter-spacing: 0.3px; }
    .chalk-order-btn { width: 100%; padding: 9px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.3); color: #fff; border-radius: 6px; font-size: 12px; font-weight: 600; letter-spacing: 2px; cursor: pointer; font-family: 'Georgia', serif; transition: background 0.2s; }
    .chalk-order-btn:active { background: rgba(255,255,255,0.18); }
    @keyframes chalk-appear { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .chalk-item.animate { animation: chalk-appear 0.5s ease forwards; }
    .chalk-writing { display: inline-block; position: relative; }
    .chalk-cursor { display: inline-block; width: 2px; height: 16px; background: rgba(255,255,255,0.8); margin-left: 2px; vertical-align: middle; animation: blink-cursor 0.5s ease infinite; }
    @keyframes blink-cursor { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    .chalk-dust { position: fixed; pointer-events: none; border-radius: 50%; background: rgba(255,255,255,0.6); animation: dust-fade 0.6s ease forwards; z-index: 999; }
    @keyframes dust-fade { 0% { opacity: 0.8; transform: scale(1) translate(0,0); } 100% { opacity: 0; transform: scale(0.3) translate(var(--dx), var(--dy)); } }

    /* POPUP */
    #order-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; display: none; align-items: center; justify-content: center; }
    #order-popup.show { display: flex; }
    .popup-box { background: #1A3A2A; border: 2px solid #C9A84C; border-radius: 12px; padding: 28px 24px; text-align: center; width: 75%; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
    .popup-icon { font-size: 36px; margin-bottom: 10px; }
    .popup-title { font-family: 'Georgia', serif; color: #C9A84C; font-size: 16px; letter-spacing: 2px; margin-bottom: 6px; }
    .popup-msg { color: rgba(255,255,255,0.7); font-size: 13px; margin-bottom: 18px; line-height: 1.5; }
    .popup-close { background: #C9A84C; color: #1A0800; border: none; border-radius: 99px; padding: 10px 28px; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 1px; }
  </style>
</head>
<body>

<div id="fade-overlay"></div>
<div id="order-popup">
  <div class="popup-box">
    <div class="popup-icon">✅</div>
    <div class="popup-title">Order Placed!</div>
    <div class="popup-msg">Your order has been received. We'll have it ready for you shortly.</div>
    <button class="popup-close" onclick="closePopup()">Great, Thanks!</button>
  </div>
</div>

<div id="scene">

  <!-- WAX SEAL SCREEN -->
  <div id="wax-screen">
    <div class="envelope-wrap">
      <div class="envelope">
        <div class="env-left"></div>
        <div class="env-right"></div>
        <div class="env-line-h"></div>
        <div class="env-cafe-name">✦ XYZ CAFE ✦</div>
        <div class="wax-seal" id="wax-seal" onclick="breakSeal()">
          <div class="wax-seal-inner">
            <div class="seal-crown">👑</div>
            <div class="seal-text">XYZ</div>
          </div>
        </div>
      </div>
    </div>
    <div class="seal-hint">✦ Tap the seal to open your invitation ✦</div>
  </div>

  <!-- INTERIOR SCREEN -->
  <div id="interior-screen">
    <div class="int-bg"></div>

    <!-- BOOK -->
    <div id="book-container">
      <div class="book" id="book">
        <div class="left-page">
          <div class="page-emoji">📖</div>
          <div class="page-name">Our Menu</div>
          <div class="page-line"></div>
        </div>
        <div class="book-divider"></div>
        <div class="book-cover" id="book-cover">
          <div class="book-spine"></div>
          <div class="book-ornament">✦</div>
          <div class="book-title">MENU</div>
          <div class="book-subtitle">XYZ CAFE</div>
          <div class="book-ornament">✦</div>
        </div>
      </div>
    </div>

    <!-- CATEGORY GRID -->
    <div id="category-grid">
      <div class="grid-title">✦ OUR MENU ✦</div>
      <div class="cat-row">
        <div class="cat-card" onclick="openChalkboard('Pizza','🍕')"><div class="cat-emoji">🍕</div><div class="cat-name">Pizza</div></div>
        <div class="cat-card" onclick="openChalkboard('Pasta','🍝')"><div class="cat-emoji">🍝</div><div class="cat-name">Pasta</div></div>
      </div>
      <div class="cat-row">
        <div class="cat-card" onclick="openChalkboard('Burger','🍔')"><div class="cat-emoji">🍔</div><div class="cat-name">Burger</div></div>
        <div class="cat-card" onclick="openChalkboard('Mexican','🌮')"><div class="cat-emoji">🌮</div><div class="cat-name">Mexican</div></div>
      </div>
      <div class="cat-row">
        <div class="cat-card" onclick="openChalkboard('Milkshake','🥛')"><div class="cat-emoji">🥛</div><div class="cat-name">Milkshake</div></div>
        <div class="cat-card" onclick="openChalkboard('Thick Shake','🧋')"><div class="cat-emoji">🧋</div><div class="cat-name">Thick Shake</div></div>
      </div>
      <div class="cat-row">
        <div class="cat-card" style="max-width:48%" onclick="openChalkboard('Cafe Special','⭐')"><div class="cat-emoji">⭐</div><div class="cat-name">Cafe Special</div></div>
      </div>
    </div>

    <!-- CHALKBOARD SCREEN -->
    <div id="chalkboard-screen">
      <div class="chalk-frame">
        <div class="chalk-surface" id="chalk-surface"></div>
      </div>
    </div>
  </div>

</div>

<script>
const categories = [
  { name: 'Pizza',        emoji: '🍕' },
  { name: 'Pasta',        emoji: '🍝' },
  { name: 'Burger',       emoji: '🍔' },
  { name: 'Mexican',      emoji: '🌮' },
  { name: 'Milkshake',    emoji: '🥛' },
  { name: 'Thick Shake',  emoji: '🧋' },
  { name: 'Cafe Special', emoji: '⭐' },
];

const menuItems = [
  { name: 'Classic Special', emoji: '✨', price: 249, desc: 'Our signature dish made with the finest ingredients and love.' },
  { name: "Chef's Delight",  emoji: '👨‍🍳', price: 299, desc: "A carefully crafted recipe straight from the chef's secret book." },
  { name: 'House Favourite', emoji: '❤️', price: 199, desc: 'Loved by our regulars — a timeless classic on every table.' },
];

let sealBroken = false;

function breakSeal() {
  if (sealBroken) return;
  sealBroken = true;

  const seal = document.getElementById('wax-seal');
  const sealRect = seal.getBoundingClientRect();
  const cx = sealRect.left + sealRect.width / 2;
  const cy = sealRect.top + sealRect.height / 2;

  // Haptic
  if (navigator.vibrate) navigator.vibrate([40, 30, 80]);

  // Ripple effect
  for (let r = 0; r < 3; r++) {
    setTimeout(() => {
      const ripple = document.createElement('div');
      ripple.className = 'seal-ripple';
      seal.parentElement.appendChild(ripple);
      setTimeout(() => ripple.remove(), 400);
    }, r * 120);
  }

  // Screen shake
  setTimeout(() => {
    document.getElementById('wax-screen').classList.add('tearing');
    setTimeout(() => document.getElementById('wax-screen').classList.remove('tearing'), 300);
  }, 300);

  // Explode particles
  setTimeout(() => {
    for (let p = 0; p < 24; p++) {
      const particle = document.createElement('div');
      particle.className = 'wax-particle';
      const size = Math.random() * 10 + 4;
      const angle = (p / 24) * Math.PI * 2;
      const dist = 60 + Math.random() * 80;
      const px = Math.cos(angle) * dist + 'px';
      const py = Math.sin(angle) * dist + 'px';
      const colors = ['#8B0000', '#C0392B', '#A93226', '#7B241C', '#E74C3C'];
      particle.style.cssText = `
        width:${size}px; height:${size}px;
        left:${cx}px; top:${cy}px;
        background:${colors[Math.floor(Math.random() * colors.length)]};
        --px:${px}; --py:${py};
      `;
      document.body.appendChild(particle);
      setTimeout(() => particle.remove(), 800);
    }

    // Hide seal
    seal.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
    seal.style.transform = 'translate(-50%,-50%) scale(0)';
    seal.style.opacity = '0';
  }, 360);

  // Fade and transition
  setTimeout(() => {
    document.getElementById('fade-overlay').style.transition = 'opacity 0.5s ease';
    document.getElementById('fade-overlay').classList.add('fade');
  }, 700);

  setTimeout(() => {
    document.getElementById('wax-screen').style.display = 'none';
    document.getElementById('interior-screen').classList.add('show');
    document.getElementById('fade-overlay').classList.remove('fade');
    buildPages();
    setTimeout(startBookAnimation, 600);
  }, 1300);
}

function buildPages() {
  const book = document.getElementById('book');
  categories.forEach((cat, i) => {
    const page = document.createElement('div');
    page.className = 'page';
    page.id = `page-${i}`;
    page.style.zIndex = categories.length - i;
    page.innerHTML = `
      <div class="page-front">
        <div class="page-emoji">${cat.emoji}</div>
        <div class="page-name">${cat.name}</div>
        <div class="page-line"></div>
      </div>
      <div class="page-back">
        <div class="page-emoji">${cat.emoji}</div>
        <div class="page-name">${cat.name}</div>
        <div class="page-line"></div>
      </div>
    `;
    book.appendChild(page);
  });
}

function startBookAnimation() {
  const bookContainer = document.getElementById('book-container');
  bookContainer.classList.add('show');
  setTimeout(() => {
    document.getElementById('book-cover').classList.add('open');
  }, 400);
  categories.forEach((_, i) => {
    setTimeout(() => {
      document.getElementById(`page-${i}`).classList.add('turned');
    }, 1000 + (i * 400));
  });
  setTimeout(() => {
    bookContainer.style.transition = 'opacity 0.5s ease';
    bookContainer.style.opacity = '0';
    setTimeout(() => {
      bookContainer.style.display = 'none';
      document.getElementById('category-grid').classList.add('show');
    }, 500);
  }, 1000 + (categories.length * 400) + 600);
}

function typeWriter(element, text, speed, callback) {
  let i = 0;
  element.innerHTML = '';
  const cursor = document.createElement('span');
  cursor.className = 'chalk-cursor';
  element.appendChild(cursor);
  function type() {
    if (i < text.length) {
      const char = document.createTextNode(text.charAt(i));
      element.insertBefore(char, cursor);
      spawnDust(element);
      i++;
      setTimeout(type, speed);
    } else {
      cursor.remove();
      if (callback) callback();
    }
  }
  type();
}

function spawnDust(element) {
  const rect = element.getBoundingClientRect();
  for (let d = 0; d < 3; d++) {
    const dust = document.createElement('div');
    dust.className = 'chalk-dust';
    const size = Math.random() * 4 + 1;
    const dx = (Math.random() - 0.5) * 20 + 'px';
    const dy = (Math.random() - 0.5) * 20 + 'px';
    dust.style.cssText = `width:${size}px;height:${size}px;left:${rect.right + Math.random()*10}px;top:${rect.top + Math.random()*rect.height}px;--dx:${dx};--dy:${dy};`;
    document.body.appendChild(dust);
    setTimeout(() => dust.remove(), 600);
  }
}

function openChalkboard(catName, catEmoji) {
  const surface = document.getElementById('chalk-surface');
  surface.innerHTML = `
    <button class="back-btn" onclick="closeChalkboard()">
      <span class="back-arrow">←</span> Back to Menu
    </button>
    <div class="chalk-title">${catEmoji} ${catName}</div>
    <div class="chalk-divider"></div>
  `;
  menuItems.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'chalk-item';
    el.id = `chalk-item-${i}`;
    el.innerHTML = `
      <div class="chalk-item-header">
        <div class="chalk-item-name">
          <span class="chalk-item-emoji">${item.emoji}</span>
          <span class="chalk-writing" id="chalk-name-${i}"></span>
        </div>
        <div class="chalk-price-tag" id="chalk-price-${i}" style="opacity:0">₹${item.price}</div>
      </div>
      <div class="chalk-item-desc" id="chalk-desc-${i}" style="opacity:0">${item.desc}</div>
      <button class="chalk-order-btn" id="chalk-btn-${i}" style="opacity:0" onclick="placeOrder('${item.name}', ${item.price})">ORDER THIS</button>
    `;
    surface.appendChild(el);
    setTimeout(() => {
      el.classList.add('animate');
      const nameEl = document.getElementById(`chalk-name-${i}`);
      typeWriter(nameEl, item.name, 40, () => {
        document.getElementById(`chalk-price-${i}`).style.cssText = 'opacity:1;transition:opacity 0.3s ease';
        setTimeout(() => {
          document.getElementById(`chalk-desc-${i}`).style.cssText = 'opacity:1;transition:opacity 0.3s ease';
          setTimeout(() => {
            document.getElementById(`chalk-btn-${i}`).style.cssText = 'opacity:1;transition:opacity 0.3s ease';
          }, 200);
        }, 200);
      });
    }, 300 + (i * 800));
  });
  document.getElementById('chalkboard-screen').classList.add('show');
}

function closeChalkboard() {
  document.getElementById('chalkboard-screen').classList.remove('show');
}

function placeOrder(name, price) {
  document.getElementById('order-popup').classList.add('show');
}

function closePopup() {
  document.getElementById('order-popup').classList.remove('show');
}
</script>
</body>
</html>
