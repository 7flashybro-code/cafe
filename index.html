<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMBER</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@600&family=Special+Elite&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Playfair Display', serif; overflow: hidden; width: 100vw; height: 100vh; background: #000; display: flex; align-items: center; justify-content: center; }
    #scene { position: relative; width: 100%; max-width: 420px; height: 100vh; overflow: hidden; background: #000; }

    /* FADE */
    #fade-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; opacity: 0; z-index: 500; pointer-events: none; transition: opacity 0.8s ease; }
    #fade-overlay.fade { opacity: 1; }

    /* ===== EMBER SCREEN ===== */
    #ember-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    /* BG IMAGE */
    .ember-bg {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover;
      filter: brightness(0) saturate(0);
      transition: filter 1.5s ease;
    }
    .ember-bg.reveal-1 { filter: brightness(0.1) saturate(0.3); }
    .ember-bg.reveal-2 { filter: brightness(0.2) saturate(0.5); }
    .ember-bg.reveal-3 { filter: brightness(0.35) saturate(0.7); }
    .ember-bg.reveal-4 { filter: brightness(0.55) saturate(0.9); }
    .ember-bg.reveal-5 { filter: brightness(0.75) saturate(1.1); }

    /* EMBER GLOW BG */
    .ember-glow-bg {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse at 50% 50%, rgba(255,80,0,0) 0%, transparent 70%);
      transition: background 0.3s ease;
      z-index: 1; pointer-events: none;
    }

    /* EMBER CORE */
    #ember-core {
      position: relative; z-index: 5;
      width: 60px; height: 60px;
      cursor: pointer; user-select: none;
      -webkit-user-select: none;
    }
    .ember-circle {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #FF8C00, #CC3300, #660000);
      box-shadow: 0 0 8px #FF4500, 0 0 0px rgba(255,100,0,0);
      transition: all 0.15s ease;
      position: relative;
    }
    .ember-circle::before {
      content: '';
      position: absolute; top: 20%; left: 20%;
      width: 30%; height: 30%;
      background: rgba(255,220,100,0.6);
      border-radius: 50%;
      filter: blur(3px);
    }

    /* SPARK */
    .spark {
      position: fixed; pointer-events: none;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: #FFD700;
      animation: spark-fly 0.8s ease forwards;
      z-index: 999;
    }
    @keyframes spark-fly {
      0% { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--sx), var(--sy)) scale(0); }
    }

    /* HOLD PROGRESS RING */
    #hold-ring {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 80px; height: 80px;
      z-index: 4; pointer-events: none;
    }
    .ring-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .ring-track { fill: none; stroke: rgba(255,100,0,0.15); stroke-width: 3; }
    .ring-progress { fill: none; stroke: #FF6B00; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 220; stroke-dashoffset: 220; transition: stroke-dashoffset 0.1s linear; }

    /* HINT */
    #ember-hint {
      position: relative; z-index: 5;
      font-family: 'Dancing Script', cursive;
      font-size: 16px; color: rgba(201,168,76,0.6);
      letter-spacing: 1px; margin-top: 28px;
      animation: hint-pulse 2s ease-in-out infinite;
      text-align: center;
    }
    @keyframes hint-pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 0.9; } }

    /* ===== MENU SCREEN ===== */
    #menu-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: none; z-index: 2; overflow: hidden;
    }
    #menu-screen.show { display: block; }

    .menu-bg {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; filter: brightness(0.4) saturate(0.8);
    }
    .menu-vignette {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse at 50% 40%, transparent 20%, rgba(0,0,0,0.65) 100%);
    }

    /* VINYL RECORD */
    #vinyl-wrap {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -52%);
      z-index: 5;
    }
    #vinyl {
      width: 260px; height: 260px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, #1A1A1A 0%, #1A1A1A 12%, transparent 12%),
        repeating-radial-gradient(circle at 50% 50%, #111 0px, #111 1px, #1C1C1C 1px, #1C1C1C 3px);
      box-shadow: 0 0 40px rgba(0,0,0,0.9), 0 8px 32px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
      position: relative;
      cursor: grab;
      transition: transform 0.1s linear;
      user-select: none;
    }
    #vinyl::before {
      content: '';
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 60px; height: 60px;
      border-radius: 50%;
      background: radial-gradient(circle, #C9A84C 0%, #8B6914 40%, #5A4010 100%);
      box-shadow: 0 0 10px rgba(201,168,76,0.4);
    }
    #vinyl::after {
      content: '';
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #000;
      z-index: 2;
    }

    /* VINYL LABEL TRACKS */
    .vinyl-track {
      position: absolute; top: 50%; left: 50%;
      transform-origin: 0 0;
      pointer-events: none;
    }
    .track-label {
      position: absolute;
      font-family: 'Special Elite', cursive;
      font-size: 9px; color: rgba(255,255,255,0.5);
      white-space: nowrap;
      letter-spacing: 1px;
    }

    /* NEEDLE */
    #needle-wrap {
      position: absolute;
      top: 10%; right: 10%;
      transform-origin: top right;
      z-index: 6;
      transition: transform 0.4s ease;
    }
    .needle-arm {
      width: 3px; height: 100px;
      background: linear-gradient(180deg, #C9A84C, #8B6914);
      border-radius: 2px;
      transform: rotate(25deg);
      transform-origin: top center;
      position: relative;
    }
    .needle-tip {
      position: absolute; bottom: -6px; left: 50%;
      transform: translateX(-50%);
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #C9A84C;
      box-shadow: 0 0 6px rgba(201,168,76,0.6);
    }
    .needle-pivot {
      width: 14px; height: 14px;
      background: radial-gradient(circle, #E0C060, #8B6914);
      border-radius: 50%;
      margin: 0 auto;
      box-shadow: 0 2px 6px rgba(0,0,0,0.6);
    }

    /* CATEGORY LABELS ON VINYL */
    .cat-segment {
      position: absolute; top: 50%; left: 50%;
      width: 100px; height: 2px;
      transform-origin: left center;
      z-index: 3;
    }
    .cat-segment-label {
      position: absolute; right: -2px; top: 50%;
      transform: translateY(-50%);
      font-family: 'Special Elite', cursive;
      font-size: 8px; color: rgba(255,255,255,0.4);
      white-space: nowrap; letter-spacing: 0.5px;
    }

    /* SELECTED CATEGORY DISPLAY */
    #selected-display {
      position: absolute; bottom: 22%; left: 0; right: 0;
      text-align: center; z-index: 5;
    }
    .selected-emoji { font-size: 32px; margin-bottom: 4px; }
    .selected-name {
      font-family: 'Dancing Script', cursive;
      font-size: 20px; color: rgba(201,168,76,0.9);
      text-shadow: 0 0 20px rgba(201,168,76,0.4);
      letter-spacing: 1px;
    }
    .selected-hint {
      font-size: 11px; color: rgba(255,255,255,0.4);
      letter-spacing: 2px; margin-top: 6px;
      font-family: 'Playfair Display', serif;
    }

    /* ENTER BUTTON */
    #enter-category-btn {
      position: absolute; bottom: 10%; left: 50%;
      transform: translateX(-50%);
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.4);
      color: rgba(201,168,76,0.85);
      padding: 11px 36px; font-size: 11px;
      font-weight: 600; letter-spacing: 4px;
      border-radius: 2px; cursor: pointer;
      font-family: 'Playfair Display', serif;
      z-index: 5;
      animation: hint-pulse 2s ease-in-out infinite;
      display: none;
    }

    /* VINYL SPIN HINT */
    #vinyl-hint {
      position: absolute; top: 8%; left: 0; right: 0;
      text-align: center; z-index: 5;
      font-family: 'Dancing Script', cursive;
      font-size: 15px; color: rgba(201,168,76,0.6);
      letter-spacing: 1px;
      animation: hint-pulse 2s ease-in-out infinite;
    }

    /* ===== PRICE TAG SCREEN ===== */
    #tag-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 20; overflow: hidden;
      transform: translateX(100%);
      transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
    }
    #tag-screen.show { transform: translateX(0); }

    .tag-bg {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; filter: brightness(0.35) saturate(0.7);
    }
    .tag-vignette {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(5,3,1,0.6);
    }

    .tag-header {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 16px 18px 12px;
      display: flex; align-items: center; gap: 12px;
      z-index: 5;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .tag-back-btn {
      background: none; border: none;
      color: rgba(255,255,255,0.45);
      font-size: 18px; cursor: pointer;
      font-family: 'Playfair Display', serif;
      padding: 4px;
    }
    .tag-screen-title {
      font-family: 'Dancing Script', cursive;
      font-size: 22px; color: rgba(201,168,76,0.85);
      letter-spacing: 1px;
    }

    /* PRICE TAGS */
    #tags-container {
      position: absolute; top: 70px; left: 0; right: 0; bottom: 0;
      overflow-y: auto; padding: 16px 20px 40px;
      z-index: 5;
    }

    .price-tag {
      position: relative;
      background: linear-gradient(160deg, #F5ECD8, #EDE0C4, #F0E8D0);
      border-radius: 4px 4px 4px 4px;
      padding: 14px 16px 16px;
      margin-bottom: 20px;
      box-shadow: 2px 4px 16px rgba(0,0,0,0.7), -1px -1px 4px rgba(0,0,0,0.3);
      transform: translateX(120%) rotate(2deg);
      opacity: 0;
      cursor: pointer;
      transition: transform 0.1s ease;
    }
    .price-tag:nth-child(2) { transform: translateX(120%) rotate(-1.5deg); }
    .price-tag:nth-child(3) { transform: translateX(120%) rotate(1deg); }
    .price-tag.swing-in { animation: tag-swing 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    .price-tag:nth-child(1).swing-in { animation-delay: 0s; }
    .price-tag:nth-child(2).swing-in { animation-delay: 0.2s; }
    .price-tag:nth-child(3).swing-in { animation-delay: 0.4s; }

    @keyframes tag-swing {
      0% { opacity: 0; transform: translateX(120%) rotate(var(--rot, 2deg)); }
      60% { opacity: 1; transform: translateX(-5%) rotate(calc(var(--rot, 2deg) * -0.5)); }
      80% { transform: translateX(2%) rotate(calc(var(--rot, 2deg) * 0.3)); }
      100% { opacity: 1; transform: translateX(0) rotate(var(--rot, 2deg)); }
    }

    /* TAG HOLE */
    .tag-hole {
      position: absolute; top: -1px; left: 50%;
      transform: translateX(-50%);
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #000;
      border: 1px solid rgba(0,0,0,0.3);
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
    }
    .tag-string {
      position: absolute; top: -24px; left: 50%;
      transform: translateX(-50%);
      width: 1px; height: 24px;
      background: rgba(100,60,20,0.6);
    }
    .tag-hook {
      position: absolute; top: -30px; left: 50%;
      transform: translateX(-50%);
      width: 20px; height: 10px;
      border-top: 2px solid rgba(100,60,20,0.5);
      border-radius: 50% 50% 0 0;
    }

    /* TAG CONTENT */
    .tag-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px dashed rgba(74,42,16,0.25); }
    .tag-emoji-name { display: flex; align-items: center; gap: 8px; }
    .tag-emoji { font-size: 22px; }
    .tag-name { font-family: 'Special Elite', cursive; font-size: 15px; color: #3A1A08; line-height: 1.2; }
    .tag-price { font-family: 'Dancing Script', cursive; font-size: 20px; color: #8B0000; font-weight: bold; }
    .tag-desc { font-size: 10px; color: rgba(74,42,16,0.55); font-style: italic; line-height: 1.6; margin-bottom: 10px; font-family: 'Playfair Display', serif; }

    /* TEAR LINE */
    .tag-tear-line {
      border-top: 2px dashed rgba(74,42,16,0.2);
      margin: 0 -16px 10px;
      position: relative;
    }
    .tag-tear-line::before { content: '✂'; position: absolute; left: -8px; top: -10px; font-size: 12px; color: rgba(74,42,16,0.25); }

    .tag-order-btn {
      width: 100%; padding: 9px;
      background: rgba(139,0,0,0.08);
      border: 1px dashed rgba(139,0,0,0.35);
      color: rgba(139,0,0,0.75);
      border-radius: 2px; font-size: 10px;
      font-weight: 600; letter-spacing: 3px;
      cursor: pointer; font-family: 'Special Elite', cursive;
      transition: all 0.2s;
    }
    .tag-order-btn:active { background: rgba(139,0,0,0.15); transform: scale(0.98); }

    /* TEAR ANIMATION */
    .price-tag.tearing {
      animation: tear-apart 0.4s ease forwards;
    }
    @keyframes tear-apart {
      0% { transform: rotate(var(--rot,2deg)) scale(1); }
      30% { transform: rotate(var(--rot,2deg)) scale(1.02) translateX(-3px); }
      60% { transform: rotate(calc(var(--rot,2deg) + 5deg)) scale(0.98) translateX(5px); opacity: 1; }
      100% { transform: rotate(15deg) scale(0.8) translateY(20px); opacity: 0; }
    }

    /* POPUP */
    #order-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 600; display: none; align-items: center; justify-content: center; }
    #order-popup.show { display: flex; }
    .popup-box { background: linear-gradient(160deg, #1C0E06, #2A1508); border: 1px solid rgba(201,168,76,0.2); border-radius: 4px; padding: 32px 24px; text-align: center; width: 78%; box-shadow: 0 16px 48px rgba(0,0,0,0.9); }
    .popup-ember { font-size: 30px; margin-bottom: 12px; }
    .popup-title { font-family: 'Dancing Script', cursive; color: rgba(201,168,76,0.85); font-size: 22px; margin-bottom: 8px; }
    .popup-msg { color: rgba(255,255,255,0.4); font-size: 11px; margin-bottom: 22px; line-height: 1.8; font-style: italic; letter-spacing: 0.5px; }
    .popup-close { background: none; color: rgba(201,168,76,0.7); border: 1px solid rgba(201,168,76,0.3); border-radius: 99px; padding: 10px 28px; font-size: 11px; cursor: pointer; letter-spacing: 3px; font-family: 'Playfair Display', serif; }
  </style>
</head>
<body>

<div id="fade-overlay"></div>
<div id="order-popup">
  <div class="popup-box">
    <div class="popup-ember">🔥</div>
    <div class="popup-title">Order Placed</div>
    <div class="popup-msg">Your selection has been torn from the board<br>and sent straight to the kitchen.</div>
    <button class="popup-close" onclick="closePopup()">PERFECT</button>
  </div>
</div>

<div id="scene">

  <!-- EMBER SCREEN -->
  <div id="ember-screen">
    <img class="ember-bg" id="ember-bg" src="https://raw.githubusercontent.com/7flashybro-code/cafe/main/entrance.png" alt="">
    <div class="ember-glow-bg" id="ember-glow-bg"></div>

    <div id="hold-ring">
      <svg class="ring-svg" viewBox="0 0 80 80">
        <circle class="ring-track" cx="40" cy="40" r="35"/>
        <circle class="ring-progress" id="ring-progress" cx="40" cy="40" r="35"/>
      </svg>
    </div>

    <div id="ember-core"
      onmousedown="startHold(event)" onmouseup="endHold()" onmouseleave="endHold()"
      ontouchstart="startHold(event)" ontouchend="endHold()" ontouchcancel="endHold()">
      <div class="ember-circle" id="ember-circle"></div>
    </div>

    <div id="ember-hint">hold the ember to ignite</div>
  </div>

  <!-- MENU SCREEN -->
  <div id="menu-screen">
    <img class="menu-bg" src="https://raw.githubusercontent.com/7flashybro-code/cafe/main/interior2.png" alt="">
    <div class="menu-vignette"></div>

    <div id="vinyl-hint">spin the record to explore</div>

    <div id="vinyl-wrap">
      <div id="vinyl"
        onmousedown="startSpin(event)" onmousemove="doSpin(event)" onmouseup="endSpin()" onmouseleave="endSpin()"
        ontouchstart="startSpin(event)" ontouchmove="doSpin(event)" ontouchend="endSpin()">
      </div>
    </div>

    <div id="needle-wrap">
      <div class="needle-pivot"></div>
      <div class="needle-arm"><div class="needle-tip"></div></div>
    </div>

    <div id="selected-display">
      <div class="selected-emoji" id="selected-emoji">🎵</div>
      <div class="selected-name" id="selected-name">Spin to select</div>
      <div class="selected-hint">drag the record</div>
    </div>

    <button id="enter-category-btn" onclick="openTags()">VIEW MENU</button>

    <!-- TAG SCREEN -->
    <div id="tag-screen">
      <img class="tag-bg" src="https://raw.githubusercontent.com/7flashybro-code/cafe/main/interior2.png" alt="">
      <div class="tag-vignette"></div>

      <div class="tag-header">
        <button class="tag-back-btn" onclick="closeTags()">←</button>
        <div class="tag-screen-title" id="tag-screen-title">Menu</div>
      </div>

      <div id="tags-container"></div>
    </div>
  </div>

</div>

<script>
const categories = [
  { name: 'Pizza',        emoji: '🍕' },
  { name: 'Pasta',        emoji: '🍝' },
  { name: 'Burger',       emoji: '🍔' },
  { name: 'Mexican',      emoji: '🌮' },
  { name: 'Milkshake',    emoji: '🥛' },
  { name: 'Thick Shake',  emoji: '🧋' },
  { name: 'Cafe Special', emoji: '⭐' },
];

const menuItems = [
  { name: 'Classic Special', emoji: '✨', price: 249, desc: 'Our signature dish. Slow cooked, served with intention.' },
  { name: "Chef's Secret",   emoji: '🔥', price: 299, desc: 'A recipe passed through generations. Order with trust.' },
  { name: 'House Favourite', emoji: '🕯️', price: 199, desc: 'Every table orders this. There is a reason for that.' },
];

// ===== EMBER HOLD =====
let holdTimer = null;
let holdProgress = 0;
let holdInterval = null;
let holdDone = false;
let sparkInterval = null;

function startHold(e) {
  e.preventDefault();
  if (holdDone) return;
  if (navigator.vibrate) navigator.vibrate(20);

  holdInterval = setInterval(() => {
    holdProgress = Math.min(holdProgress + 2, 100);
    updateEmber();
    if (holdProgress >= 100 && !holdDone) {
      holdDone = true;
      clearInterval(holdInterval);
      clearInterval(sparkInterval);
      triggerIgnition();
    }
  }, 30);

  sparkInterval = setInterval(() => {
    spawnSpark();
  }, 80);
}

function endHold() {
  if (holdDone) return;
  clearInterval(holdInterval);
  clearInterval(sparkInterval);
  // Slowly decay
  const decay = setInterval(() => {
    holdProgress = Math.max(holdProgress - 3, 0);
    updateEmber();
    if (holdProgress <= 0) clearInterval(decay);
  }, 50);
}

function updateEmber() {
  const circle = document.getElementById('ember-circle');
  const bg = document.getElementById('ember-bg');
  const glowBg = document.getElementById('ember-glow-bg');
  const ring = document.getElementById('ring-progress');
  const hint = document.getElementById('ember-hint');

  // Ring progress (dashoffset from 220 to 0)
  const offset = 220 - (220 * holdProgress / 100);
  ring.style.strokeDashoffset = offset;

  const p = holdProgress;
  if (p < 20) {
    circle.style.boxShadow = `0 0 ${8 + p}px #FF4500, 0 0 ${p}px rgba(255,100,0,0.3)`;
    circle.style.transform = 'scale(1)';
    bg.className = 'ember-bg';
    glowBg.style.background = 'radial-gradient(ellipse at 50% 50%, rgba(255,80,0,0.02) 0%, transparent 70%)';
  } else if (p < 40) {
    circle.style.boxShadow = `0 0 ${20 + p/2}px #FF4500, 0 0 ${p}px rgba(255,100,0,0.5)`;
    circle.style.transform = 'scale(1.05)';
    bg.className = 'ember-bg reveal-1';
    glowBg.style.background = 'radial-gradient(ellipse at 50% 50%, rgba(255,80,0,0.08) 0%, transparent 70%)';
    hint.textContent = 'keep holding...';
  } else if (p < 60) {
    circle.style.boxShadow = `0 0 35px #FF4500, 0 0 60px rgba(255,100,0,0.5)`;
    circle.style.transform = 'scale(1.1)';
    bg.className = 'ember-bg reveal-2';
    glowBg.style.background = 'radial-gradient(ellipse at 50% 50%, rgba(255,80,0,0.15) 0%, transparent 70%)';
    hint.textContent = 'almost there...';
  } else if (p < 80) {
    circle.style.boxShadow = `0 0 50px #FF6B00, 0 0 100px rgba(255,120,0,0.6)`;
    circle.style.transform = 'scale(1.15)';
    bg.className = 'ember-bg reveal-3';
    glowBg.style.background = 'radial-gradient(ellipse at 50% 50%, rgba(255,100,0,0.25) 0%, transparent 65%)';
    hint.textContent = '🔥 almost...';
  } else {
    circle.style.boxShadow = `0 0 70px #FF8C00, 0 0 140px rgba(255,140,0,0.7), 0 0 220px rgba(255,80,0,0.4)`;
    circle.style.transform = 'scale(1.2)';
    bg.className = 'ember-bg reveal-4';
    glowBg.style.background = 'radial-gradient(ellipse at 50% 50%, rgba(255,120,0,0.4) 0%, transparent 65%)';
    hint.textContent = '🔥🔥🔥';
  }
}

function spawnSpark() {
  const core = document.getElementById('ember-core');
  const rect = core.getBoundingClientRect();
  const spark = document.createElement('div');
  spark.className = 'spark';
  const angle = Math.random() * Math.PI * 2;
  const dist = 40 + Math.random() * 60;
  const sx = Math.cos(angle) * dist + 'px';
  const sy = (Math.sin(angle) * dist - 20) + 'px';
  spark.style.cssText = `left:${rect.left + rect.width/2}px;top:${rect.top + rect.height/2}px;--sx:${sx};--sy:${sy};background:${Math.random() > 0.5 ? '#FFD700' : '#FF6B00'};`;
  document.body.appendChild(spark);
  setTimeout(() => spark.remove(), 800);
}

function triggerIgnition() {
  if (navigator.vibrate) navigator.vibrate([40, 20, 80, 20, 120]);
  const bg = document.getElementById('ember-bg');
  bg.className = 'ember-bg reveal-5';
  document.getElementById('ember-glow-bg').style.background = 'radial-gradient(ellipse at 50% 50%, rgba(255,150,50,0.6) 0%, transparent 70%)';
  document.getElementById('ember-hint').textContent = '';

  setTimeout(() => {
    document.getElementById('fade-overlay').style.transition = 'opacity 0.7s ease';
    document.getElementById('fade-overlay').classList.add('fade');
  }, 500);

  setTimeout(() => {
    document.getElementById('ember-screen').style.display = 'none';
    document.getElementById('menu-screen').classList.add('show');
    document.getElementById('fade-overlay').classList.remove('fade');
    buildVinyl();
  }, 1300);
}

// ===== VINYL SPIN =====
let vinylRotation = 0;
let lastAngle = null;
let isSpinning = false;
let selectedCatIndex = -1;
let spinVelocity = 0;
let spinMomentum = null;

function buildVinyl() {
  const vinyl = document.getElementById('vinyl');
  categories.forEach((cat, i) => {
    const segment = document.createElement('div');
    segment.className = 'cat-segment';
    const angle = (i / categories.length) * 360;
    segment.style.cssText = `position:absolute;top:50%;left:50%;width:110px;height:1px;transform-origin:left center;transform:rotate(${angle}deg);`;
    segment.innerHTML = `<div style="position:absolute;left:70px;top:50%;transform:translateY(-50%);font-family:'Special Elite',cursive;font-size:8px;color:rgba(255,255,255,0.35);white-space:nowrap;letter-spacing:0.5px;">${cat.emoji} ${cat.name}</div>`;
    vinyl.appendChild(segment);
  });
}

function getAngle(e, el) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const touch = e.touches ? e.touches[0] : e;
  return Math.atan2(touch.clientY - cy, touch.clientX - cx) * 180 / Math.PI;
}

function startSpin(e) {
  e.preventDefault();
  isSpinning = true;
  lastAngle = getAngle(e, document.getElementById('vinyl'));
  clearInterval(spinMomentum);
}

function doSpin(e) {
  e.preventDefault();
  if (!isSpinning) return;
  const angle = getAngle(e, document.getElementById('vinyl'));
  let delta = angle - lastAngle;
  if (delta > 180) delta -= 360;
  if (delta < -180) delta += 360;
  spinVelocity = delta;
  vinylRotation += delta;
  lastAngle = angle;
  document.getElementById('vinyl').style.transform = `rotate(${vinylRotation}deg)`;
  updateSelectedCategory();
}

function endSpin() {
  if (!isSpinning) return;
  isSpinning = false;
  // Momentum
  spinMomentum = setInterval(() => {
    if (Math.abs(spinVelocity) < 0.3) { clearInterval(spinMomentum); return; }
    spinVelocity *= 0.95;
    vinylRotation += spinVelocity;
    document.getElementById('vinyl').style.transform = `rotate(${vinylRotation}deg)`;
    updateSelectedCategory();
  }, 16);
}

function updateSelectedCategory() {
  // Needle points at ~60deg from top
  const needleAngle = 60;
  const normalised = (((-vinylRotation + needleAngle) % 360) + 360) % 360;
  const segmentSize = 360 / categories.length;
  const idx = Math.floor(normalised / segmentSize) % categories.length;

  if (idx !== selectedCatIndex) {
    selectedCatIndex = idx;
    const cat = categories[idx];
    document.getElementById('selected-emoji').textContent = cat.emoji;
    document.getElementById('selected-name').textContent = cat.name;
    document.getElementById('enter-category-btn').style.display = 'block';
    if (navigator.vibrate) navigator.vibrate(15);
  }
}

// ===== PRICE TAGS =====
function openTags() {
  if (selectedCatIndex < 0) return;
  const cat = categories[selectedCatIndex];
  document.getElementById('tag-screen-title').textContent = `${cat.emoji} ${cat.name}`;
  const container = document.getElementById('tags-container');
  container.innerHTML = '';

  const rots = [2, -1.5, 1];
  menuItems.forEach((item, i) => {
    const tag = document.createElement('div');
    tag.className = 'price-tag';
    tag.style.setProperty('--rot', rots[i] + 'deg');
    tag.innerHTML = `
      <div class="tag-string"></div>
      <div class="tag-hole"></div>
      <div class="tag-top">
        <div class="tag-emoji-name">
          <span class="tag-emoji">${item.emoji}</span>
          <span class="tag-name">${item.name}</span>
        </div>
        <div class="tag-price">₹${item.price}</div>
      </div>
      <div class="tag-desc">${item.desc}</div>
      <div class="tag-tear-line"></div>
      <button class="tag-order-btn" onclick="tearTag(this, '${item.name}')">✂ TEAR TO ORDER</button>
    `;
    container.appendChild(tag);
    setTimeout(() => tag.classList.add('swing-in'), 50 + i * 180);
  });

  document.getElementById('tag-screen').classList.add('show');
}

function tearTag(btn, name) {
  const tag = btn.closest('.price-tag');
  if (navigator.vibrate) navigator.vibrate([30, 20, 60]);
  tag.classList.add('tearing');
  setTimeout(() => {
    document.getElementById('order-popup').classList.add('show');
  }, 400);
}

function closeTags() {
  document.getElementById('tag-screen').classList.remove('show');
  setTimeout(() => {
    document.getElementById('tags-container').innerHTML = '';
  }, 450);
}

function closePopup() {
  document.getElementById('order-popup').classList.remove('show');
}
</script>
